<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 3 - Card Interativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="product-card">
        <div class="card-image">
            <img src="https://m.media-amazon.com/images/I/418ezHg2MbL.jpg" alt="Produto">
        </div>
        <div class="card-content">
            <h2 class="product-title">Moto GO5</h2>
            <p class="product-price">R$ 2.499,00</p>
            <button class="btn-buy">Comprar Agora</button>
        </div>
    </div>

</body>
</html>
